<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <title>JJC V2 handle sleeve fit diagram</title>
  <desc>Diagram showing the long tapered V2 handle sleeve around the hardwood dowel.</desc>
  <defs>
    <style>
      .bg { fill: #f7f7f2; }
      .panel { fill: #ffffff; stroke: #2f3437; stroke-width: 2; }
      .title { font: 700 34px Arial, sans-serif; fill: #202426; }
      .subtitle { font: 600 24px Arial, sans-serif; fill: #202426; }
      .label { font: 20px Arial, sans-serif; fill: #202426; }
      .small { font: 16px Arial, sans-serif; fill: #4b5357; }
      .handle { fill: #7cc4b8; stroke: #1f6f68; stroke-width: 4; }
      .cut { fill: #ffffff; stroke: #1f6f68; stroke-width: 3; }
      .dowel { fill: #b98554; stroke: #68401f; stroke-width: 4; }
      .axis { stroke: #50585c; stroke-width: 2; stroke-dasharray: 12 10; }
      .dim { stroke: #202426; stroke-width: 2; marker-start: url(#arrow); marker-end: url(#arrow); }
      .callout { stroke: #202426; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202426"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="60" y="64">JJC V2 - Item 3 - Handle Sleeve</text>
  <text class="small" x="60" y="96">Purpose: long Delphin-style tapered grip around the 1/2 inch dowel.</text>
  <rect class="panel" x="60" y="130" width="1080" height="560" rx="8"/>
  <text class="subtitle" x="100" y="185">Tapered sleeve on dowel</text>
  <line class="axis" x1="145" y1="380" x2="1060" y2="380"/>
  <rect class="dowel" x="150" y="364" width="900" height="32" rx="14"/>
  <path class="handle" d="M 230 338 L 980 322 L 980 438 L 230 422 Z"/>
  <ellipse class="handle" cx="230" cy="380" rx="24" ry="42"/>
  <ellipse class="handle" cx="980" cy="380" rx="34" ry="58"/>
  <ellipse class="cut" cx="230" cy="380" rx="14" ry="25"/>
  <ellipse class="cut" cx="980" cy="380" rx="18" ry="31"/>
  <line class="dim" x1="230" y1="560" x2="980" y2="560"/>
  <text class="label" x="530" y="600">185 mm sleeve length</text>
  <line class="dim" x1="1080" y1="322" x2="1080" y2="438"/>
  <text class="label" x="900" y="295">24 mm grip/collar-side OD</text>
  <line class="dim" x1="170" y1="338" x2="170" y2="422"/>
  <text class="label" x="115" y="295">18.2 mm knob-side OD</text>
  <path class="callout" d="M 610 362 C 570 300, 500 255, 430 245"/>
  <text class="label" x="235" y="240">13.2 mm inner bore</text>
  <text class="small" x="235" y="265">slides over measured dowel</text>
  <text class="small" x="100" y="650">Print as one vertical sleeve if stable, or split later if the tall TPU print wobbles.</text>
</svg>
