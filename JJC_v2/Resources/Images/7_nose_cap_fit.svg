<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <title>JJC V2 nose cap fit diagram</title>
  <desc>Diagram showing the V2 nose cap, blind dowel socket, screw clearance hole, and fit to the upper body shell.</desc>
  <defs>
    <style>
      .bg { fill: #f7f7f2; }
      .panel { fill: #ffffff; stroke: #2f3437; stroke-width: 2; }
      .title { font: 700 34px Arial, sans-serif; fill: #202426; }
      .subtitle { font: 600 24px Arial, sans-serif; fill: #202426; }
      .label { font: 20px Arial, sans-serif; fill: #202426; }
      .small { font: 16px Arial, sans-serif; fill: #4b5357; }
      .nose { fill: #9db58f; stroke: #4a6c3c; stroke-width: 4; }
      .upper { fill: #cfe3f2; stroke: #2e5f89; stroke-width: 3; opacity: 0.75; }
      .cut { fill: #ffffff; stroke: #4a6c3c; stroke-width: 3; }
      .dowel { fill: #b98554; stroke: #68401f; stroke-width: 4; }
      .screw { fill: #c7ccd1; stroke: #555d63; stroke-width: 3; }
      .axis { stroke: #50585c; stroke-width: 2; stroke-dasharray: 12 10; }
      .dim { stroke: #202426; stroke-width: 2; marker-start: url(#arrow); marker-end: url(#arrow); }
      .callout { stroke: #202426; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202426"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="60" y="64">JJC V2 - Item 7 - Nose Cap</text>
  <text class="small" x="60" y="96">Purpose: short cap that matches the 40 mm Part 6 nose end and protects the dowel tip.</text>
  <rect class="panel" x="60" y="130" width="500" height="560" rx="8"/>
  <text class="subtitle" x="100" y="180">Part cross-section</text>
  <line class="axis" x1="310" y1="225" x2="310" y2="595"/>
  <path class="nose" d="M 238 330 C 228 352, 228 428, 238 450 L 382 450 C 392 428, 392 352, 382 330 Z"/>
  <path class="nose" d="M 270 300 C 255 310, 244 320, 238 330 L 382 330 C 376 320, 365 310, 350 300 Z"/>
  <rect class="cut" x="278" y="368" width="64" height="58" rx="14"/>
  <rect class="screw" x="302" y="300" width="16" height="68" rx="5"/>
  <path class="screw" d="M 286 310 L 334 310 L 320 333 L 300 333 Z"/>
  <line class="dim" x1="230" y1="640" x2="390" y2="640"/>
  <text class="label" x="214" y="675">40 mm socket-side diameter</text>
  <line class="dim" x1="430" y1="300" x2="430" y2="450"/>
  <text class="label" x="448" y="380">12 mm height</text>
  <text class="small" x="110" y="715">Socket: 13.2 mm diameter x 7 mm deep</text>
  <rect class="panel" x="640" y="130" width="500" height="560" rx="8"/>
  <text class="subtitle" x="680" y="180">Fit at nose end</text>
  <line class="axis" x1="700" y1="390" x2="1085" y2="390"/>
  <rect class="dowel" x="720" y="374" width="350" height="32" rx="14"/>
  <path class="upper" d="M 680 330 C 780 350, 880 360, 990 365 L 990 415 C 880 420, 780 430, 680 450 Z"/>
  <path class="nose" d="M 990 330 L 1035 350 C 1055 370, 1055 410, 1035 430 L 990 450 Z"/>
  <rect class="screw" x="975" y="383" width="80" height="14" rx="5"/>
  <path class="callout" d="M 955 325 C 900 280, 825 250, 745 245"/>
  <text class="label" x="705" y="245">40 mm bottom matches Part 6</text>
  <text class="small" x="705" y="270">blind socket captures dowel tip</text>
  <path class="callout" d="M 1030 390 C 1060 318, 1035 270, 970 255"/>
  <text class="label" x="735" y="600">3.2 mm screw clearance</text>
  <text class="small" x="735" y="625">10 mm x 2 mm screw-head chamfer</text>
</svg>
