<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <title>JJC V2 knob cap fit diagram</title>
  <desc>Diagram showing the V2 knob cap, blind dowel socket, and centered screw pilot hole.</desc>
  <defs>
    <style>
      .bg { fill: #f7f7f2; }
      .panel { fill: #ffffff; stroke: #2f3437; stroke-width: 2; }
      .title { font: 700 34px Arial, sans-serif; fill: #202426; }
      .subtitle { font: 600 24px Arial, sans-serif; fill: #202426; }
      .label { font: 20px Arial, sans-serif; fill: #202426; }
      .small { font: 16px Arial, sans-serif; fill: #4b5357; }
      .knob { fill: #86a6d9; stroke: #274d85; stroke-width: 4; }
      .cut { fill: #ffffff; stroke: #274d85; stroke-width: 3; }
      .dowel { fill: #b98554; stroke: #68401f; stroke-width: 4; }
      .screw { fill: #c7ccd1; stroke: #555d63; stroke-width: 3; }
      .axis { stroke: #50585c; stroke-width: 2; stroke-dasharray: 12 10; }
      .dim { stroke: #202426; stroke-width: 2; marker-start: url(#arrow); marker-end: url(#arrow); }
      .callout { stroke: #202426; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202426"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="60" y="64">JJC V2 - Item 2 - Knob Cap</text>
  <text class="small" x="60" y="96">Purpose: protects the handle end and provides a catching stop.</text>
  <rect class="panel" x="60" y="130" width="500" height="560" rx="8"/>
  <text class="subtitle" x="100" y="180">Part cross-section</text>
  <line class="axis" x1="310" y1="225" x2="310" y2="595"/>
  <path class="knob" d="M 260 230 C 215 260, 208 340, 248 372 L 248 470 C 208 502, 215 582, 260 612 L 360 612 C 405 582, 412 502, 372 470 L 372 372 C 412 340, 405 260, 360 230 Z"/>
  <rect class="cut" x="278" y="355" width="64" height="172" rx="14"/>
  <rect class="screw" x="302" y="230" width="16" height="126" rx="5"/>
  <path class="screw" d="M 286 245 L 334 245 L 320 280 L 300 280 Z"/>
  <line class="dim" x1="245" y1="640" x2="375" y2="640"/>
  <text class="label" x="214" y="675">33 mm outer diameter</text>
  <line class="dim" x1="420" y1="230" x2="420" y2="612"/>
  <text class="label" x="438" y="430">28 mm height</text>
  <text class="small" x="110" y="715">Socket: 13.2 mm diameter x 22 mm deep</text>
  <rect class="panel" x="640" y="130" width="500" height="560" rx="8"/>
  <text class="subtitle" x="680" y="180">Fit on handle end</text>
  <line class="axis" x1="700" y1="390" x2="1085" y2="390"/>
  <rect class="dowel" x="735" y="374" width="350" height="32" rx="14"/>
  <path class="knob" d="M 712 330 C 668 350, 660 430, 712 450 L 770 450 C 800 430, 800 350, 770 330 Z"/>
  <rect class="screw" x="685" y="383" width="80" height="14" rx="5"/>
  <path class="callout" d="M 735 334 C 760 280, 830 250, 905 245"/>
  <text class="label" x="905" y="245">Blind dowel socket</text>
  <text class="small" x="905" y="270">dowel stops before cap end</text>
  <path class="callout" d="M 690 390 C 670 320, 705 270, 760 255"/>
  <text class="label" x="715" y="600">#6 pilot through closed end</text>
  <text class="small" x="715" y="625">10 mm screw-seat chamfer on outside face</text>
</svg>
