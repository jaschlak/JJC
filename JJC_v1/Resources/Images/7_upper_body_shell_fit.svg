<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <title>JJC V1 upper body shell fit diagram</title>
  <desc>Diagram showing the upper body shell as a hollow tapered TPU shell printed wide-side down and narrowing toward the nose cap.</desc>

  <defs>
    <style>
      .bg { fill: #f7f7f2; }
      .panel { fill: #ffffff; stroke: #2f3437; stroke-width: 2; }
      .title { font: 700 34px Arial, sans-serif; fill: #202426; }
      .subtitle { font: 600 24px Arial, sans-serif; fill: #202426; }
      .label { font: 20px Arial, sans-serif; fill: #202426; }
      .small { font: 16px Arial, sans-serif; fill: #4b5357; }
      .shell { fill: #cfe3f2; stroke: #2e5f89; stroke-width: 4; }
      .shell-cut { fill: #ffffff; stroke: #2e5f89; stroke-width: 4; }
      .lower { fill: #d7ece8; stroke: #1f6f68; stroke-width: 4; }
      .nose { fill: #9db58f; stroke: #4a6c3c; stroke-width: 4; }
      .ring { fill: #f1c75b; stroke: #8b6515; stroke-width: 4; }
      .dowel { fill: #b98554; stroke: #68401f; stroke-width: 4; }
      .axis { stroke: #50585c; stroke-width: 2; stroke-dasharray: 12 10; }
      .dim { stroke: #202426; stroke-width: 2; marker-start: url(#arrow); marker-end: url(#arrow); }
      .callout { stroke: #202426; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202426"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <text class="title" x="60" y="64">JJC V1 - Item 7 - Upper Body Shell</text>
  <text class="small" x="60" y="96">Purpose: continue the hollow club body from the wide body section toward the nose cap.</text>

  <rect class="panel" x="60" y="130" width="500" height="560" rx="8"/>
  <text class="subtitle" x="100" y="180">Part: hollow tapered shell</text>

  <path class="shell" d="M 185 245 L 435 245 L 350 565 L 270 565 Z"/>
  <ellipse class="shell" cx="310" cy="245" rx="125" ry="36"/>
  <ellipse class="shell" cx="310" cy="565" rx="40" ry="13"/>
  <path class="shell-cut" d="M 202 245 L 418 245 L 340 565 L 280 565 Z"/>
  <ellipse class="shell-cut" cx="310" cy="245" rx="108" ry="30"/>
  <ellipse class="shell-cut" cx="310" cy="565" rx="30" ry="9"/>
  <rect class="dowel" x="292" y="245" width="36" height="320"/>
  <ellipse class="dowel" cx="310" cy="245" rx="18" ry="5"/>
  <ellipse class="dowel" cx="310" cy="565" rx="18" ry="5"/>
  <rect class="ring" x="202" y="245" width="216" height="18"/>
  <ellipse class="ring" cx="310" cy="263" rx="108" ry="30"/>
  <ellipse class="shell-cut" cx="310" cy="263" rx="38" ry="10"/>
  <rect class="ring" x="280" y="547" width="60" height="18"/>
  <ellipse class="ring" cx="310" cy="565" rx="30" ry="9"/>
  <ellipse class="shell-cut" cx="310" cy="565" rx="20" ry="6"/>
  <line class="axis" x1="310" y1="195" x2="310" y2="610"/>

  <line class="dim" x1="185" y1="635" x2="435" y2="635"/>
  <text class="label" x="215" y="670">58 mm wide side on XY</text>

  <line class="dim" x1="270" y1="210" x2="350" y2="210"/>
  <text class="label" x="195" y="197">32 mm nose side</text>

  <line class="dim" x1="480" y1="245" x2="480" y2="565"/>
  <text class="label" x="500" y="395">120 mm</text>
  <text class="label" x="500" y="420">height</text>

  <text class="small" x="105" y="715">Includes 20 mm OD dowel sleeve and 5 mm internal bulkheads</text>

  <rect class="panel" x="640" y="130" width="500" height="560" rx="8"/>
  <text class="subtitle" x="680" y="180">Fit in club assembly</text>

  <rect class="dowel" x="888" y="205" width="34" height="430" rx="10"/>
  <line class="axis" x1="905" y1="185" x2="905" y2="655"/>

  <ellipse class="nose" cx="905" cy="210" rx="42" ry="58"/>
  <path class="shell" d="M 790 265 L 1020 265 L 950 455 L 860 455 Z"/>
  <ellipse class="shell" cx="905" cy="265" rx="115" ry="28"/>
  <ellipse class="shell" cx="905" cy="455" rx="45" ry="14"/>
  <path class="shell-cut" d="M 810 265 L 1000 265 L 938 455 L 872 455 Z"/>
  <ellipse class="shell-cut" cx="905" cy="265" rx="95" ry="22"/>
  <ellipse class="shell-cut" cx="905" cy="455" rx="33" ry="10"/>
  <rect class="dowel" x="889" y="265" width="32" height="190"/>
  <rect class="ring" x="810" y="265" width="190" height="15"/>
  <ellipse class="ring" cx="905" cy="280" rx="95" ry="22"/>
  <ellipse class="shell-cut" cx="905" cy="280" rx="34" ry="8"/>
  <rect class="ring" x="872" y="440" width="66" height="15"/>
  <ellipse class="ring" cx="905" cy="455" rx="33" ry="10"/>
  <ellipse class="shell-cut" cx="905" cy="455" rx="20" ry="6"/>

  <path class="lower" d="M 785 455 L 1025 455 L 975 610 L 835 610 Z"/>
  <ellipse class="lower" cx="905" cy="455" rx="120" ry="28"/>
  <ellipse class="lower" cx="905" cy="610" rx="70" ry="18"/>

  <path class="callout" d="M 790 265 C 735 250, 695 220, 680 180"/>
  <text class="label" x="680" y="160">Item 7: Upper body shell</text>
  <text class="small" x="680" y="185">built-in sleeve and bulkheads</text>

  <path class="callout" d="M 945 210 C 1010 185, 1055 190, 1095 225"/>
  <text class="label" x="990" y="245">Item 8: Nose cap</text>
  <text class="small" x="990" y="270">future part</text>

  <path class="callout" d="M 1025 530 C 1065 555, 1090 590, 1100 635"/>
  <text class="label" x="965" y="660">Item 6: Lower shell</text>
</svg>
