<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <title>JJC V1 body-to-handle collar fit diagram</title>
  <desc>Diagram showing the tapered body-to-handle collar between the handle sleeve and future lower body shell.</desc>

  <defs>
    <style>
      .bg { fill: #f7f7f2; }
      .panel { fill: #ffffff; stroke: #2f3437; stroke-width: 2; }
      .title { font: 700 34px Arial, sans-serif; fill: #202426; }
      .subtitle { font: 600 24px Arial, sans-serif; fill: #202426; }
      .label { font: 20px Arial, sans-serif; fill: #202426; }
      .small { font: 16px Arial, sans-serif; fill: #4b5357; }
      .collar { fill: #d89562; stroke: #7a431b; stroke-width: 4; }
      .collar-cut { fill: #ffffff; stroke: #7a431b; stroke-width: 4; }
      .handle { fill: #7cc4b8; stroke: #1f6f68; stroke-width: 4; }
      .body { fill: #d7ece8; stroke: #1f6f68; stroke-width: 4; }
      .dowel { fill: #b98554; stroke: #68401f; stroke-width: 4; }
      .axis { stroke: #50585c; stroke-width: 2; stroke-dasharray: 12 10; }
      .dim { stroke: #202426; stroke-width: 2; marker-start: url(#arrow); marker-end: url(#arrow); }
      .callout { stroke: #202426; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202426"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <text class="title" x="60" y="64">JJC V1 - Item 5 - Body-to-Handle Collar</text>
  <text class="small" x="60" y="96">Purpose: taper from the 24 mm handle sleeve toward the wider club body.</text>

  <rect class="panel" x="60" y="130" width="500" height="560" rx="8"/>
  <text class="subtitle" x="100" y="180">Part: tapered collar</text>

  <path class="collar" d="M 245 245 L 375 245 L 445 520 L 175 520 Z"/>
  <ellipse class="collar" cx="310" cy="245" rx="65" ry="20"/>
  <ellipse class="collar" cx="310" cy="520" rx="135" ry="38"/>
  <ellipse class="collar-cut" cx="310" cy="245" rx="39" ry="12"/>
  <ellipse class="collar-cut" cx="310" cy="520" rx="39" ry="12"/>
  <line class="axis" x1="310" y1="190" x2="310" y2="575"/>

  <line class="dim" x1="245" y1="210" x2="375" y2="210"/>
  <text class="label" x="105" y="205">24 mm lower OD</text>

  <line class="dim" x1="175" y1="595" x2="445" y2="595"/>
  <text class="label" x="215" y="635">42 mm upper OD</text>

  <line class="dim" x1="485" y1="245" x2="485" y2="520"/>
  <text class="label" x="500" y="370">35 mm</text>
  <text class="label" x="500" y="395">height</text>

  <text class="small" x="105" y="700">Center hole: 13.2 mm for a 12.7 mm dowel plus 0.5 mm clearance</text>

  <rect class="panel" x="640" y="130" width="500" height="560" rx="8"/>
  <text class="subtitle" x="680" y="180">Fit in club assembly</text>

  <rect class="dowel" x="885" y="205" width="40" height="420" rx="10"/>
  <line class="axis" x1="905" y1="185" x2="905" y2="645"/>

  <path class="body" d="M 825 210 C 770 285, 765 345, 835 390 L 975 390 C 1045 345, 1040 285, 985 210 Z"/>
  <ellipse class="body" cx="905" cy="390" rx="72" ry="18"/>

  <path class="collar" d="M 865 390 L 945 390 L 1015 515 L 795 515 Z"/>
  <ellipse class="collar" cx="905" cy="390" rx="40" ry="12"/>
  <ellipse class="collar" cx="905" cy="515" rx="110" ry="28"/>
  <ellipse class="collar-cut" cx="905" cy="390" rx="17" ry="6"/>
  <ellipse class="collar-cut" cx="905" cy="515" rx="17" ry="6"/>

  <rect class="handle" x="855" y="515" width="100" height="105"/>
  <ellipse class="handle" cx="905" cy="515" rx="50" ry="14"/>
  <ellipse class="handle" cx="905" cy="620" rx="50" ry="14"/>

  <path class="callout" d="M 795 515 C 740 505, 700 470, 685 420"/>
  <text class="label" x="675" y="400">Item 5: Collar</text>
  <text class="small" x="675" y="425">transition from handle to body</text>

  <path class="callout" d="M 955 570 C 1010 555, 1050 555, 1085 575"/>
  <text class="label" x="930" y="610">Item 3: Handle sleeve</text>

  <path class="callout" d="M 985 260 C 1030 230, 1070 225, 1100 245"/>
  <text class="label" x="970" y="215">Future body shell</text>
</svg>
