<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <title>JJC V1 lower body shell fit diagram</title>
  <desc>Diagram showing the lower body shell as a hollow tapered TPU shell printed wide-side down.</desc>

  <defs>
    <style>
      .bg { fill: #f7f7f2; }
      .panel { fill: #ffffff; stroke: #2f3437; stroke-width: 2; }
      .title { font: 700 34px Arial, sans-serif; fill: #202426; }
      .subtitle { font: 600 24px Arial, sans-serif; fill: #202426; }
      .label { font: 20px Arial, sans-serif; fill: #202426; }
      .small { font: 16px Arial, sans-serif; fill: #4b5357; }
      .shell { fill: #d7ece8; stroke: #1f6f68; stroke-width: 4; }
      .shell-cut { fill: #ffffff; stroke: #1f6f68; stroke-width: 4; }
      .collar { fill: #d89562; stroke: #7a431b; stroke-width: 4; }
      .ring { fill: #f1c75b; stroke: #8b6515; stroke-width: 4; }
      .dowel { fill: #b98554; stroke: #68401f; stroke-width: 4; }
      .axis { stroke: #50585c; stroke-width: 2; stroke-dasharray: 12 10; }
      .dim { stroke: #202426; stroke-width: 2; marker-start: url(#arrow); marker-end: url(#arrow); }
      .callout { stroke: #202426; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202426"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <text class="title" x="60" y="64">JJC V1 - Item 6 - Lower Body Shell</text>
  <text class="small" x="60" y="96">Purpose: create the first hollow tapered body section above the handle collar.</text>

  <rect class="panel" x="60" y="130" width="500" height="560" rx="8"/>
  <text class="subtitle" x="100" y="180">Part: hollow tapered shell</text>

  <path class="shell" d="M 185 245 L 435 245 L 375 565 L 245 565 Z"/>
  <ellipse class="shell" cx="310" cy="245" rx="125" ry="36"/>
  <ellipse class="shell" cx="310" cy="565" rx="65" ry="20"/>
  <path class="shell-cut" d="M 202 245 L 418 245 L 363 565 L 257 565 Z"/>
  <ellipse class="shell-cut" cx="310" cy="245" rx="108" ry="30"/>
  <ellipse class="shell-cut" cx="310" cy="565" rx="53" ry="15"/>
  <rect class="dowel" x="292" y="245" width="36" height="320"/>
  <ellipse class="dowel" cx="310" cy="245" rx="18" ry="5"/>
  <ellipse class="dowel" cx="310" cy="565" rx="18" ry="5"/>
  <rect class="ring" x="202" y="245" width="216" height="18"/>
  <ellipse class="ring" cx="310" cy="263" rx="108" ry="30"/>
  <ellipse class="shell-cut" cx="310" cy="263" rx="38" ry="10"/>
  <rect class="ring" x="257" y="547" width="106" height="18"/>
  <ellipse class="ring" cx="310" cy="565" rx="53" ry="15"/>
  <ellipse class="shell-cut" cx="310" cy="565" rx="38" ry="10"/>
  <line class="axis" x1="310" y1="195" x2="310" y2="610"/>

  <line class="dim" x1="185" y1="635" x2="435" y2="635"/>
  <text class="label" x="215" y="670">58 mm wide side on XY</text>

  <line class="dim" x1="245" y1="210" x2="375" y2="210"/>
  <text class="label" x="190" y="197">42 mm collar side</text>

  <line class="dim" x1="480" y1="245" x2="480" y2="565"/>
  <text class="label" x="500" y="395">120 mm</text>
  <text class="label" x="500" y="420">height</text>

  <text class="small" x="105" y="715">Includes 20 mm OD dowel sleeve and 5 mm internal bulkheads</text>

  <rect class="panel" x="640" y="130" width="500" height="560" rx="8"/>
  <text class="subtitle" x="680" y="180">Fit in club assembly</text>

  <rect class="dowel" x="888" y="220" width="34" height="420" rx="10"/>
  <line class="axis" x1="905" y1="195" x2="905" y2="660"/>

  <path class="shell" d="M 785 230 L 1025 230 L 965 455 L 845 455 Z"/>
  <ellipse class="shell" cx="905" cy="230" rx="120" ry="30"/>
  <ellipse class="shell" cx="905" cy="455" rx="60" ry="18"/>
  <path class="shell-cut" d="M 805 230 L 1005 230 L 953 455 L 857 455 Z"/>
  <ellipse class="shell-cut" cx="905" cy="230" rx="100" ry="24"/>
  <ellipse class="shell-cut" cx="905" cy="455" rx="48" ry="13"/>
  <rect class="dowel" x="889" y="230" width="32" height="225"/>
  <rect class="ring" x="805" y="230" width="200" height="16"/>
  <ellipse class="ring" cx="905" cy="246" rx="100" ry="24"/>
  <ellipse class="shell-cut" cx="905" cy="246" rx="34" ry="8"/>
  <rect class="ring" x="857" y="439" width="96" height="16"/>
  <ellipse class="ring" cx="905" cy="455" rx="48" ry="13"/>
  <ellipse class="shell-cut" cx="905" cy="455" rx="34" ry="8"/>
  <path class="collar" d="M 850 455 L 960 455 L 995 560 L 815 560 Z"/>
  <ellipse class="collar" cx="905" cy="455" rx="55" ry="15"/>
  <ellipse class="collar" cx="905" cy="560" rx="90" ry="24"/>

  <path class="callout" d="M 785 230 C 735 220, 695 195, 680 160"/>
  <text class="label" x="680" y="145">Item 6: Lower body shell</text>
  <text class="small" x="680" y="170">prints wide-side down</text>

  <path class="callout" d="M 922 330 C 1015 315, 1060 335, 1090 375"/>
  <text class="label" x="990" y="395">Integrated sleeve</text>
  <text class="small" x="990" y="420">replaces separate ring here</text>

  <path class="callout" d="M 960 510 C 1015 530, 1055 570, 1075 630"/>
  <text class="label" x="955" y="650">Item 5: Collar</text>
</svg>
