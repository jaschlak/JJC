<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <title>JJC V1 handle sleeve fit diagram</title>
  <desc>Diagram showing the handle sleeve as a hollow TPU tube and how it slides over the dowel rod to form the club grip.</desc>

  <defs>
    <style>
      .bg { fill: #f7f7f2; }
      .panel { fill: #ffffff; stroke: #2f3437; stroke-width: 2; }
      .title { font: 700 34px Arial, sans-serif; fill: #202426; }
      .subtitle { font: 600 24px Arial, sans-serif; fill: #202426; }
      .label { font: 20px Arial, sans-serif; fill: #202426; }
      .small { font: 16px Arial, sans-serif; fill: #4b5357; }
      .sleeve { fill: #7cc4b8; stroke: #1f6f68; stroke-width: 4; }
      .sleeve-cut { fill: #ffffff; stroke: #1f6f68; stroke-width: 4; }
      .dowel { fill: #b98554; stroke: #68401f; stroke-width: 4; }
      .axis { stroke: #50585c; stroke-width: 2; stroke-dasharray: 12 10; }
      .dim { stroke: #202426; stroke-width: 2; marker-start: url(#arrow); marker-end: url(#arrow); }
      .callout { stroke: #202426; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202426"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <text class="title" x="60" y="64">JJC V1 - Item 3 - Handle Sleeve</text>
  <text class="small" x="60" y="96">Purpose: create a comfortable TPU grip around the rigid 1/2 inch dowel spine.</text>

  <rect class="panel" x="60" y="130" width="500" height="560" rx="8"/>
  <text class="subtitle" x="100" y="180">Part: hollow sleeve</text>

  <ellipse class="sleeve" cx="310" cy="230" rx="120" ry="38"/>
  <rect class="sleeve" x="190" y="230" width="240" height="300"/>
  <ellipse class="sleeve" cx="310" cy="530" rx="120" ry="38"/>
  <ellipse class="sleeve-cut" cx="310" cy="230" rx="66" ry="20"/>
  <ellipse class="sleeve-cut" cx="310" cy="530" rx="66" ry="20"/>
  <line class="axis" x1="310" y1="170" x2="310" y2="590"/>

  <line class="dim" x1="190" y1="625" x2="430" y2="625"/>
  <text class="label" x="220" y="660">24 mm outer diameter</text>

  <line class="dim" x1="482" y1="230" x2="482" y2="530"/>
  <text class="label" x="500" y="388">80 mm length</text>

  <text class="small" x="105" y="705">Inner hole: 13.2 mm for a 12.7 mm dowel plus 0.5 mm clearance</text>

  <rect class="panel" x="640" y="130" width="500" height="560" rx="8"/>
  <text class="subtitle" x="680" y="180">Fit on dowel rod</text>

  <rect class="dowel" x="718" y="363" width="360" height="54" rx="18"/>
  <ellipse class="dowel" cx="718" cy="390" rx="14" ry="27"/>
  <ellipse class="dowel" cx="1078" cy="390" rx="14" ry="27"/>
  <line class="axis" x1="690" y1="390" x2="1110" y2="390"/>

  <rect class="sleeve" x="810" y="318" width="190" height="144" rx="10"/>
  <ellipse class="sleeve" cx="810" cy="390" rx="28" ry="72"/>
  <ellipse class="sleeve" cx="1000" cy="390" rx="28" ry="72"/>
  <ellipse class="sleeve-cut" cx="810" cy="390" rx="12" ry="32"/>
  <ellipse class="sleeve-cut" cx="1000" cy="390" rx="12" ry="32"/>

  <path class="callout" d="M 890 318 C 875 275, 830 250, 775 250"/>
  <text class="label" x="675" y="240">Item 3: TPU handle sleeve</text>
  <text class="small" x="675" y="265">slides over the dowel</text>

  <path class="callout" d="M 1035 390 C 1080 330, 1090 285, 1070 245"/>
  <text class="label" x="960" y="230">Dowel rod</text>
  <text class="small" x="960" y="255">1/2 inch = 12.7 mm</text>

  <path class="callout" d="M 905 462 C 905 520, 855 555, 790 565"/>
  <text class="label" x="690" y="585">Grip diameter test</text>
  <text class="small" x="690" y="610">adjust after holding a print</text>
</svg>
