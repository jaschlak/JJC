<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360">
  <title>JJC V3 dowel rod fit diagram</title>
  <style>
    .bg{fill:#f7f7f2}.title{font:700 30px Arial;fill:#202426}.label{font:20px Arial;fill:#202426}.small{font:16px Arial;fill:#4b5357}
    .dowel{fill:#b98554;stroke:#68401f;stroke-width:4}.axis{stroke:#50585c;stroke-width:2;stroke-dasharray:10 8}
    .dim{stroke:#202426;stroke-width:2;marker-start:url(#a);marker-end:url(#a)}
  </style>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#202426"/></marker></defs>
  <rect class="bg" width="1000" height="360"/>
  <text class="title" x="50" y="55">JJC V3 - Item 1 - Dowel Rod</text>
  <line class="axis" x1="80" y1="180" x2="920" y2="180"/>
  <rect class="dowel" x="110" y="156" width="780" height="48" rx="24"/>
  <line class="dim" x1="110" y1="250" x2="890" y2="250"/>
  <text class="label" x="430" y="290">502 mm length</text>
  <line class="dim" x1="930" y1="156" x2="930" y2="204"/>
  <text class="label" x="760" y="145">12.7 mm diameter</text>
  <text class="small" x="50" y="330">Printed clearance holes and sockets use 13.2 mm.</text>
</svg>
