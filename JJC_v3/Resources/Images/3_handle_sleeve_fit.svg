<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <title>JJC V3 handle sleeve fit diagram</title>
  <style>
    .bg{fill:#f7f7f2}.title{font:700 30px Arial;fill:#202426}.label{font:20px Arial;fill:#202426}.small{font:16px Arial;fill:#4b5357}
    .sleeve{fill:#d7ece8;stroke:#1f6f68;stroke-width:4}.hole{fill:#fff;stroke:#202426;stroke-width:3;stroke-dasharray:8 6}
    .dim{stroke:#202426;stroke-width:2;marker-start:url(#a);marker-end:url(#a)}
  </style>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#202426"/></marker></defs>
  <rect class="bg" width="1000" height="420"/>
  <text class="title" x="50" y="55">JJC V3 - Item 3 - Handle Sleeve</text>
  <path class="sleeve" d="M150 170 L850 135 L850 285 L150 250 Z"/>
  <path class="hole" d="M150 195 L850 185 L850 235 L150 225 Z"/>
  <line class="dim" x1="150" y1="330" x2="850" y2="330"/>
  <text class="label" x="440" y="370">185 mm length</text>
  <text class="label" x="105" y="155">18.2 mm OD</text>
  <text class="label" x="760" y="120">24 mm OD</text>
  <text class="small" x="380" y="305">13.2 mm through hole</text>
</svg>
