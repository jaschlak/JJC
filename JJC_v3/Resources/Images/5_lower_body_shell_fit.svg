<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <title>JJC V3 lower hollow body shell fit diagram</title>
  <style>
    .bg{fill:#f7f7f2}.title{font:700 32px Arial;fill:#202426}.label{font:20px Arial;fill:#202426}.small{font:16px Arial;fill:#4b5357}
    .shell{fill:#d7ece8;stroke:#1f6f68;stroke-width:4}.void{fill:#fff;stroke:#1f6f68;stroke-width:2}.plate{fill:#f1c75b;stroke:#8b6515;stroke-width:3}
    .lip{fill:#7cc4b8;stroke:#1f6f68;stroke-width:3}.bore{fill:#fff;stroke:#202426;stroke-width:3;stroke-dasharray:8 6}
    .dim{stroke:#202426;stroke-width:2;marker-start:url(#a);marker-end:url(#a)}
  </style>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#202426"/></marker></defs>
  <rect class="bg" width="1200" height="700"/>
  <text class="title" x="60" y="60">JJC V3 - Item 5 - Lower Hollow Body Shell</text>
  <path class="shell" d="M230 300 C430 210 640 180 930 150 C980 245 995 455 930 550 C640 520 430 490 230 400 Z"/>
  <path class="void" d="M255 320 C445 245 650 220 900 195 C945 275 955 425 900 505 C650 480 445 455 255 380 Z"/>
  <rect class="plate" x="230" y="300" width="36" height="100"/>
  <rect class="lip" x="850" y="250" width="90" height="200"/>
  <rect class="bore" x="190" y="338" width="790" height="24" rx="12"/>
  <line class="dim" x1="230" y1="610" x2="930" y2="610"/>
  <text class="label" x="535" y="650">115 mm height</text>
  <text class="label" x="110" y="285">42 mm OD</text>
  <text class="label" x="875" y="130">78 mm OD</text>
  <text class="label" x="790" y="230">10 mm male slip lip</text>
  <text class="label" x="455" y="205">hollow air cavity</text>
  <text class="small" x="455" y="230">no full-length dowel sleeve</text>
  <text class="small" x="95" y="450">4 mm closed bottom plate with 13.2 mm dowel hole</text>
  <text class="small" x="760" y="475">74.0 mm lip OD, 70.0 mm lip ID</text>
</svg>
