<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
  <title>JJC V3 knob cap fit diagram</title>
  <style>
    .bg{fill:#f7f7f2}.title{font:700 30px Arial;fill:#202426}.label{font:20px Arial;fill:#202426}.small{font:16px Arial;fill:#4b5357}
    .cap{fill:#d7ece8;stroke:#1f6f68;stroke-width:4}.void{fill:#fff;stroke:#202426;stroke-width:3;stroke-dasharray:8 6}
    .screw{fill:none;stroke:#8b6515;stroke-width:4}.dim{stroke:#202426;stroke-width:2;marker-start:url(#a);marker-end:url(#a)}
  </style>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#202426"/></marker></defs>
  <rect class="bg" width="1000" height="520"/>
  <text class="title" x="50" y="55">JJC V3 - Item 2 - Knob Cap</text>
  <path class="cap" d="M330 130 C275 160 250 210 250 260 C250 310 275 360 330 390 L670 390 C725 360 750 310 750 260 C750 210 725 160 670 130 Z"/>
  <rect class="void" x="500" y="215" width="250" height="90" rx="45"/>
  <path class="screw" d="M250 260 L395 260"/>
  <line class="dim" x1="250" y1="440" x2="750" y2="440"/>
  <text class="label" x="450" y="475">28 mm height</text>
  <text class="label" x="555" y="205">13.2 mm socket</text>
  <text class="small" x="555" y="330">22 mm socket depth, 6 mm closed end</text>
  <text class="small" x="80" y="330">#6 pilot through closed end</text>
</svg>
